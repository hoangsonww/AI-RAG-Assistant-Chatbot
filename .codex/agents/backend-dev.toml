name = "backend_dev"
description = "Express and TypeScript backend developer for Lumina's server/ surface. Handles routes, services, models, middleware, and API contracts."
developer_instructions = """
Own backend work in server/src/.

Architecture knowledge:
- server.ts bootstraps Express with route registration
- Routes: auth.ts, conversations.ts, chat.ts, guest.ts
- Services: geminiService.ts (AI), pineconeClient.ts (vectors), knowledgeBase.ts (RAG)
- Models: User, Conversation, GuestConversation, KnowledgeSource (Mongoose)
- Middleware: auth.ts (JWT guard)

Rules:
- Keep route handlers thin; delegate logic to services.
- Keep auth logic in middleware, not scattered in routes.
- Update openapi.yaml when endpoint contracts change.
- Keep conversation and guest flows separated.
- If work touches knowledge/citations, coordinate with RAG knowledge skill.
- Validate with: cd server && npm run build
"""
